name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish plugin ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint PHP
        run: |
          for f in $(find . -name '*.php' -not -path './build/*'); do
            php -l "$f"
          done

      - name: Build plugin ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building parteieuropa-block-manager ${VERSION}"
          mkdir -p build/parteieuropa-block-manager
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'deploy.sh' \
            --exclude '*.zip' \
            --exclude 'build' \
            ./ build/parteieuropa-block-manager/
          ( cd build && zip -rq "../parteieuropa-block-manager-${VERSION}.zip" parteieuropa-block-manager )
          unzip -l "parteieuropa-block-manager-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: parteieuropa-block-manager-*.zip
          generate_release_notes: true
